<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Denuncie IFC</title>
    <style>
        body {
            margin: 0;
            font-family: Roboto, sans-serif;
            text-align: center;
        }
        .escondido {
            display: none;
        }

        form:has(#check:checked) .escondido {
            display: block;
        }

        form:has(#toggleDiv1:checked) .div1 .div_button1 {
            display: block;
        }

        form:has(#toggleDiv2:checked) .div2 .div_button2 {
            display: block;
        }

        form {
            width: 80%;
            display: inline-block;
            margin-top: 1%;
        }
        div {
            text-align: left;
            margin: 1%
        }
        header {
            padding: 0.5%;
            background-color: rgb(33, 116, 0);
            color:rgb(255, 255, 255);
        }
        .div1 {
            display: none;
        }
        .div2 {
            display: none;
        }
        .button1 .button2  {
            display: block;
        }

    </style>
</head>
<body>
    <header><h1>Denuncie IFC</h1></header>

    <form action="get">
        <div>
            <label for="">deseja se identificar?</label>
            <input type="checkbox" id="check">
        </div> 

        <div class="escondido">
            <label for="">Nome Completo:</label>
            <input type="text">
            
            <label for="">Turma:</label>
            <input type="text">
        </div> 

        <div class="div_button1">
            <label for="toggleDiv1" class="button1">Próximo</label>
            <input type="checkbox" id="toggleDiv1" hidden>
        </div>
        
        <div class="div1">
            <label for="">selecione o tipo de denuncia</label>
            <select name="Tipo de denuncia">
                <option>mal comportamento discente</option>
                <option>mal comportamento docente</option>
                <option>estrutura escolar degradada</option>
                <option>falta de qualidade da comida no restaurante ou da cantina</option>
                <option>falta de seguranca na escola</option>
                <option>assedio ou estupro</option>
            </select>
        </div>

        <div class="div_button2">
            <label for="toggleDiv2" class="button2">Próximo</label>
            <input type="checkbox" id="toggleDiv2" hidden>
        </div>

        <div class="div2">
            <label for="">Faça sua denuncia</label>
            <input type="text">
        </div>    
        <button>Enviar Resposta</button>
    </form>
</body>
</html>
