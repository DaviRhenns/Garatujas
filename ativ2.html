<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Denuncie IFC</title>
    <style>
        body {
            margin: 0;
            font-family: Roboto, sans-serif;
            text-align: center;
            color: rgb(45, 45, 45);
        }
        .escondido {
            display: none;
            grid-template-columns: 1fr 1fr;
            gap: 1%;
        }

        button {
            display: none;
        }

        form:has(#check:checked) .escondido {
            display: block;
        }

        form:has(#toggleDiv1:checked) .div1 {
            display: block;
        }

        

        form:has(#toggleDiv1:checked) .div_anterior1 {
            display: block;
        }


        form:has(#toggleDiv1:checked) .div_button2 {
            display: inline-block;
        }

        form:has(#toggleDiv2:checked) .div2  {
            display: block;
        }
        
        form:has(#toggleDiv2:checked) button {
            display: block;
        }

        form {
            width: 80%;
            display: inline-block;
            margin-top: 1%;
        }
        div {
            transition: all 0.2s ease;
            text-align: center;
            margin: 1%;
            width: 100%;
            padding: 1%;
            border-radius: 10px;
            background-color: rgb(250, 250, 250);
            border: 1px solid rgb(217, 217, 217);
        }
        form > div {
            box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.3);
            
            font-size: 120%;
        }
        header {
            padding: 0.5%;
            background-color: rgb(33, 116, 0);
            color:rgb(255, 255, 255);
        }
        .div1 {
            display: none;
        }
        .div2 {
            display: none;
        }
        .div_button2  {
            display: none;
            background-color: rgb(33, 116, 0);
            color: rgb(247, 247, 247);
            width: 50%;
        }
        
        .div_SN:has(#check:checked) .labelS {
            color: red;
        }

        .div_SN:has(#checkN:checked) .labelN {
            color: red;
            transform: scale(1.2);
        }
        
        .texto_denuncia {
            width: 1000px;
        }

        .div_esc_filho {
            width: 96%;
        }

       .div_button1 {
            background-color: rgb(33, 116, 0);
            color: rgb(247, 247, 247);
            width: 50%;
            display: inline-block;
       }

       .div_button1:hover {
            transform: scale(1.05);
            background-color: rgb(26, 93, 0);
       }
       input:hover {
            transform: scale(1.02);
       }
       div:hover {
            transform: scale(1.02);
            cursor: pointer; 
       }
       option:hover {
            background-color: rgb(159, 159, 159);
       }

       .denuncias_type {
        width: 96%;
       }
       .denuncias_type:hover {
            background-color: rgb(233, 233, 233);
       }

      

        label:has(#denuncia:checked) .denuncias_type{
            background-color: rgb(202, 202, 202);
            transform: scale(1.02);
        }

        label:has(#denuncia2:checked) .denuncias_type{
            background-color: rgb(202, 202, 202);
            transform: scale(1.02);
        }
        
        label:has(#denuncia3:checked) .denuncias_type{
            background-color: rgb(202, 202, 202);
            transform: scale(1.02);
        }

        label:has(#denuncia4:checked) .denuncias_type{
            background-color: rgb(202, 202, 202);
            transform: scale(1.02);
        }

        label:has(#denuncia5:checked) .denuncias_type{
            background-color: rgb(202, 202, 202);
            transform: scale(1.02);
        }

        label:has(#denuncia6:checked) .denuncias_type{
            background-color: rgb(202, 202, 202);
            transform: scale(1.02);
        }


        .div_SN label {
            font-size: 1.17em;
        }

    </style>
</head>
<body>

    <header><h1>Denuncie IFC</h1></header>

    <main>

    <form action="get">
        <div class="div_SN">
            <label for="">Deseja se identificar?</label>
            <label for="check" class="labelS">SIM</label>
            <input type="radio" id="check" name="SN" hidden>
            <label for="checkN" class="labelN">NAO</label>
            <input type="radio" id="checkN" name="SN" hidden>
        </div> 

        <div class="escondido">
            <div class="div_esc_filho">
                <label for="">Nome Completo:</label>
                <input type="text">
            </div>
            
            <div class="div_esc_filho">
                <label for="">Turma:</label>
                <input type="text">
            </div>
            
        </div> 

        <label for="toggleDiv1">
            <div class="div_button1">
                <label for="toggleDiv1" class="button1">Próximo</label>
                <input type="checkbox" id="toggleDiv1" hidden>
            </div>
        </label>
        
        
        
        <div class="div1">
            <label for="" class="tipo"><h3>Selecione o Tipo de Denuncia</h3></label>

            <label for="denuncia">
                <div class="denuncias_type">
                    <label for="denuncia">mal comportamento discente</label>
                    <input type="radio" id="denuncia"  name="tipoDenuncia" hidden>
                </div>
            </label>
                
            <label for="denuncia2"> 
                <div class="denuncias_type">
                    <label for="denuncia2">mal comportamento docente</label>
                    <input type="radio" id="denuncia2" name="tipoDenuncia" hidden>
                </div>
            </label>  

            <label for="denuncia3">
                <div class="denuncias_type">
                    <label for="denuncia3">estrutura escolar degradada</label>
                    <input type="radio" id="denuncia3" name="tipoDenuncia" hidden>
                </div>
            </label>
            
            <label for="denuncia4">
                <div class="denuncias_type">
                    <label for="denuncia4">falta de qualidade da comida no restaurante ou da cantina</label>
                    <input type="radio" id="denuncia4" name="tipoDenuncia" hidden>
                </div>
            </label>

            <label for="denuncia5">   
                <div class="denuncias_type">
                    <label for="denuncia5">falta de seguranca na escola</label>
                    <input type="radio" id="denuncia5" name="tipoDenuncia" hidden>
                </div>
            </label>

            <label for="denuncia6"> 
                <div class="denuncias_type">
                    <label for="denuncia6">assedio ou estupro</label>
                    <input type="radio" id="denuncia6" name="tipoDenuncia" hidden>
                </div>
            </label>    

        </div>

        <label for="toggleDiv2">
            <div class="div_button2">
                <label for="toggleDiv2" class="button2">Próximo</label>
                <input type="checkbox" id="toggleDiv2" hidden>
            </div>
        </label>

        <div class="div2">
            <h3>Faça sua denuncia</h3>
            <textarea rows="7" cols="180" placeholder="faça sua denuncia aqui"></textarea>

        </div> 
        
        <button>Enviar Resposta</button>
    </form>

    </main>
</body>
</html>
